<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Church Mega Platform</title>
<script>
  (function(){
    var KEY = 'church_session_v1';
    var raw = null;
    try { raw = sessionStorage.getItem(KEY) || localStorage.getItem(KEY); } catch(_){}
    if (!raw){ location.replace('login.html'); return; }
    var s = null;
    try { s = JSON.parse(raw); } catch(_){
      // Corrupted session — wipe and send to login
      try { sessionStorage.removeItem(KEY); } catch(__){}
      try { localStorage.removeItem(KEY); } catch(__){}
      location.replace('login.html');
      return;
    }
    if (!s || typeof s !== 'object' || !s.role){
      try { sessionStorage.removeItem(KEY); } catch(__){}
      try { localStorage.removeItem(KEY); } catch(__){}
      location.replace('login.html');
      return;
    }
    location.replace(s.role === 'super_admin' ? 'super-admin.html' : 'dashboard.html');
  })();
</script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>  </body>
</html>
